
services:
  # Go应用服务
  go-ai-insight:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_ENDPOINT=http://ollama:11434
      - MILVUS_ENDPOINT=http://milvus:19530
    depends_on:
      - ollama
      - milvus
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./internal:/app/internal

  # Ollama服务（LLM引擎）
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Milvus服务（向量数据库）
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_RETENTION_RUNTIME=1h
    command: etcd --advertise-client-urls http://127.0.0.1:2379 --listen-client-urls http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd-data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.15
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    ports:
      - "19531:19530"
    depends_on:
      - etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19530/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_data:
  milvus_data:
  etcd_data:
  minio_data:
